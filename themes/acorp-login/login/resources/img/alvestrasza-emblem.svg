<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Alvestrasza Corporation Emblem</title>
  <desc id="desc">Minimal circular A-Corp emblem fallback for login theme previews.</desc>
  <defs>
    <radialGradient id="silverGlow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f1f4f5" stop-opacity="0.96"/>
      <stop offset="56%" stop-color="#c5cdd0" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#8b9aa1" stop-opacity="0.58"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="214" fill="none" stroke="url(#silverGlow)" stroke-width="12" opacity="0.86"/>
  <circle cx="256" cy="256" r="178" fill="none" stroke="#d4483e" stroke-width="3" opacity="0.78"/>
  <path d="M256 92 374 390h-54l-25-70h-79l-25 70h-54L256 92Zm0 91-43 93h86l-43-93Z" fill="#f1f4f5" filter="url(#glow)"/>
  <path d="M174 410h164" stroke="#d4483e" stroke-width="10" stroke-linecap="round" opacity="0.92"/>
  <path d="M140 156c32-34 72-52 116-52s84 18 116 52" fill="none" stroke="#c5cdd0" stroke-width="6" stroke-linecap="round" opacity="0.42"/>
</svg>
